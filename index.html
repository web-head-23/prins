<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clothing Store</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
    }
    .product {
      background: white;
      padding: 20px;
      margin: 50px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px 20px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    .form-popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }
    input, textarea {
      width: 90%;
      margin: 10px;
      padding: 8px;
    }
  </style>
</head>
<body>

<h1>My Clothing Brand</h1>

<div class="product">
  <h2>RAWFORM T-Shirt</h2>
  <p>Price: ₹799</p>
  <button onclick="openForm()">Buy Now</button>
</div>

<!-- Order Form -->
<div class="form-popup" id="orderForm">
  <h3>Enter Delivery Details</h3>

  <form action="https://formsubmit.co/YOUR_EMAIL@gmail.com" method="POST">
    
    <!-- Replace with your email above -->

    <input type="text" name="name" placeholder="Full Name" required>
    <input type="text" name="phone" placeholder="Phone Number" required>
    <textarea name="address" placeholder="Full Address" required></textarea>

    <!-- Hidden Product Info -->
    <input type="hidden" name="product" value="RAWFORM T-Shirt">
    <input type="hidden" name="price" value="799">

    <!-- Redirect after submit -->
    <input type="hidden" name="_next" value="https://example.com/thankyou.html">

    <!-- Disable captcha -->
    <input type="hidden" name="_captcha" value="false">

    <button type="submit" onclick="payUPI()">Confirm Order</button>
    <br><br>
    <button type="button" onclick="closeForm()">Cancel</button>

  </form>
</div>

<script>
  function openForm() {
    document.getElementById("orderForm").style.display = "block";
  }

  function closeForm() {
    document.getElementById("orderForm").style.display = "none";
  }

  function payUPI() {
    // Replace with your UPI ID
    let upiID = "yourupi@upi";
    let amount = "799";
    let name = "Clothing Store";

    let upiLink = `upi://pay?pa=${upiID}&pn=${name}&am=${amount}&cu=INR`;

    window.open(upiLink, '_blank');
  }
</script>

</body>
</html>
