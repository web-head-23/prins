<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>T-Shirt Store</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: black;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      letter-spacing: 2px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }

    .card {
      background: white;
      width: 250px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      overflow: hidden;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .card h3 {
      margin: 10px 0;
    }

    .price {
      color: green;
      font-size: 18px;
      margin-bottom: 10px;
    }

    .btn {
      display: inline-block;
      margin-bottom: 15px;
      padding: 10px 20px;
      background: #25D366;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }

    .btn:hover {
      background: #1ebe5d;
    }
  </style>
</head>

<body>

<header>RAWFORM T-Shirts</header>

<div class="container">

  <!-- Product 1 -->
  <div class="card">
    <img src="https://via.placeholder.com/250" alt="Tshirt">
    <h3>Black Minimal Tee</h3>
    <div class="price">₹499</div>
    <a class="btn" href="https://wa.me/919991014205?text=I%20want%20to%20buy%20Black%20Minimal%20Tee%20for%20₹499">
      Buy on WhatsApp
    </a>
  </div>

  <!-- Product 2 -->
  <div class="card">
    <img src="https://via.placeholder.com/250" alt="Tshirt">
    <h3>Flash Compression Tee</h3>
    <div class="price">₹799</div>
    <a class="btn" href="https://wa.me/919999999999?text=I%20want%20to%20buy%20Flash%20Compression%20Tee%20for%20₹799">
      Buy on WhatsApp
    </a>
  </div>

  <!-- Product 3 -->
  <div class="card">
    <img src="https://via.placeholder.com/250" alt="Tshirt">
    <h3>Notorious Tee</h3>
    <div class="price">₹599</div>
    <a class="btn" href="https://wa.me/919999999999?text=I%20want%20to%20buy%20Notorious%20Tee%20for%20₹599">
      Buy on WhatsApp
    </a>
  </div>

</div>

</body>
</html>
